version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: shop_demo
      POSTGRES_USER: shop_user
      POSTGRES_PASSWORD: shop_password
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/lib/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    networks:
      - shop-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=shop_demo
      - DB_USER=shop_user
      - DB_PASSWORD=shop_password
    ports:
      - '8080:8080'
    depends_on:
      - postgres
    networks:
      - shop-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - '3000:80'
    depends_on:
      - backend
    networks:
      - shop-network

networks:
  shop-network:
    driver: bridge

volumes:
  pgdata:
